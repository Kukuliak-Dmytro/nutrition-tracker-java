spring:
  application:
    name: nutrition-tracker-api

  datasource:
    url: jdbc:postgresql://localhost:5432/nutrition_tracker
    username: nutrition_user
    password: nutrition_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: 8080

gemini:
  api-key: ${GEMINI_API_KEY:}

app:
  seed-on-startup: true
  cors:
    allowed-origins: http://localhost:3000

logging:
  level:
    root: ERROR
